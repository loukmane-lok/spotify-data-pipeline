name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Code Quality & Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with Ruff
        run: ruff check src/ tests/ dags/

      - name: Format check with Ruff
        run: ruff format --check src/ tests/ dags/

      - name: Type check with MyPy
        run: mypy src/

      - name: Run tests
        env:
          # Provide dummy env vars for config module
          KAFKA_BOOTSTRAP_SERVERS: "localhost:9092"
          KAFKA_TOPIC: "test-topic"
          S3_BUCKET_NAME: "test-bucket"
          AWS_ACCESS_KEY_ID: "test-key"
          AWS_SECRET_ACCESS_KEY: "test-secret"
          SNOWFLAKE_USER: "test"
          SNOWFLAKE_PASSWORD: "test"
          SNOWFLAKE_ACCOUNT: "test"
          SNOWFLAKE_WAREHOUSE: "test"
          SNOWFLAKE_DATABASE: "test"
          SNOWFLAKE_SCHEMA: "test"
          SNOWFLAKE_TABLE: "test"
        run: pytest tests/ -v --tb=short

  dbt-lint:
    name: dbt Model Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install sqlfluff
        run: pip install sqlfluff sqlfluff-templater-dbt

      - name: Lint SQL models
        run: |
          cd spotify_dbt
          sqlfluff lint models/ --dialect snowflake || true
